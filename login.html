<!DOCTYPE html>
<html>
<head>
  <title>Admin Login</title>
  <style>
    body{
      font-family:Arial;
      text-align:center;
      background:#f2f2f2;
      padding-top:100px;
    }

    .login-box{
      background:white;
      width:300px;
      margin:auto;
      padding:20px;
      border-radius:10px;
      box-shadow:0 2px 6px rgba(0,0,0,0.2);
    }

    input{
      width:90%;
      padding:10px;
      margin:10px 0;
    }

    button{
      padding:10px 20px;
      background:#1e3a8a;
      color:white;
      border:none;
      border-radius:5px;
    }
  </style>
</head>

<body>

<div class="login-box">
  <h2>🔐 Admin Login</h2>

  <input type="text" id="user" placeholder="Username">

  <input type="password" id="pass" placeholder="Password">

  <button onclick="login()">Login</button>

  <p id="msg"></p>
</div>

<script>
function login(){

let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(u==="admin" && p==="1234"){
window.location.href="upload.html";
}
else{
document.getElementById("msg").innerHTML="❌ Wrong Username or Password";
}

}
</script>

</body>
</html>
